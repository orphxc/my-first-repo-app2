<h2>Hoenn Gym Leaders</h2>
<p class="motto-display">{{ activeMotto() }}</p>

<div class="leaders-container">
  @for (leader of hoennLeaders(); track leader.name) {
    <app-leader-info 
      [name]="leader.name" 
      [age]="leader.age"
      [location]="leader.location"
      [team]="leader.team" 
      [badge]="leader.badge"
      [motto]="leader.motto"
      (showMotto)="displayMotto($event)">
    </app-leader-info>
  }
</div>
