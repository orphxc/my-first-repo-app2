<h2>Kanto Gym Leaders</h2>
<p class="motto-display">{{ activeMotto() }}</p>

<div class="leaders-container">
  @for (leader of leaders; track leader.name) {
    <app-leader-info 
      [name]="leader.name" 
      [location]="leader.location" 
      [team]="leader.team" 
      [badge]="leader.badge" 
      [motto]="leader.motto" 
      [age]="leader.age" 
      (showMotto)="displayMotto($event)">
    </app-leader-info>
  }
</div>
